<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullCalendar Resource Timeline Demo</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.11/index.global.min.js'></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light-border.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Chế độ xem</h3>
            </div>
            <div class="sidebar-options">
                <button class="sidebar-option active" data-view="resourceTimelineYears">
                    <span class="option-icon">📅</span>
                    <span class="option-label">Xem theo Năm (Tháng)</span>
                </button>
                <button class="sidebar-option" data-view="resourceTimelineMonth">
                    <span class="option-icon">📆</span>
                    <span class="option-label">Xem theo Tháng (Ngày)</span>
                </button>
            </div>
            
            <div class="sidebar-section">
                <h4 class="section-title">Chọn thời gian</h4>
                <div class="filter-group">
                    <label for="filter-year">Năm</label>
                    <select id="filter-year" class="sidebar-select">
                        <option value="2025">2025</option>
                        <option value="2026" selected>2026</option>
                        <option value="2027">2027</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filter-month">Tháng</label>
                    <select id="filter-month" class="sidebar-select">
                        <option value="01">Tháng 1</option>
                        <option value="02">Tháng 2</option>
                        <option value="03">Tháng 3</option>
                        <option value="04">Tháng 4</option>
                        <option value="05" selected>Tháng 5</option>
                        <option value="06">Tháng 6</option>
                        <option value="07">Tháng 7</option>
                        <option value="08">Tháng 8</option>
                        <option value="09">Tháng 9</option>
                        <option value="10">Tháng 10</option>
                        <option value="11">Tháng 11</option>
                        <option value="12">Tháng 12</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="calendar-wrapper">
            <div id='calendar'></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
