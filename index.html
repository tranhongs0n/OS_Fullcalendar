<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FullCalendar Resource Timeline Demo</title>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar-scheduler@6.1.11/index.global.min.js'></script>
    <script src="https://unpkg.com/@popperjs/core@2"></script>
    <script src="https://unpkg.com/tippy.js@6"></script>
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
    <link rel="stylesheet" href="https://unpkg.com/tippy.js@6/themes/light-border.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Chế độ xem</h3>
            </div>
            <div class="sidebar-options">
                <button class="sidebar-option active" data-view="resourceTimelineYears">
                    <span class="option-icon">📅</span>
                    <span class="option-label">Xem theo Năm (Tháng)</span>
                </button>
                <button class="sidebar-option" data-view="resourceTimelineMonth">
                    <span class="option-icon">📆</span>
                    <span class="option-label">Xem theo Tháng (Ngày)</span>
                </button>
            </div>
        </div>
        <div class="calendar-wrapper">
            <div id='calendar'></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
